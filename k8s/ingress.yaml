apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terrachain-ingress
  namespace: terrachain
spec:
  rules:
    - host: terrachain.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: terrachain-app
                port:
                  number: 80
