apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: terrachain
data:
  01-schema.sql: |
    CREATE DATABASE IF NOT EXISTS terrachain_v2 CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    USE terrachain_v2;
    
    CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(100) NOT NULL UNIQUE,
        email VARCHAR(200) NOT NULL UNIQUE,
        password_hash VARCHAR(255) NOT NULL,
        full_name VARCHAR(200),
        phone VARCHAR(50),
        national_id VARCHAR(100),
        role ENUM('admin','user') DEFAULT 'user',
        is_active TINYINT(1) DEFAULT 1,
        wallet_address VARCHAR(42) UNIQUE,
        otp_code VARCHAR(6),
        otp_expires DATETIME,
        created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
        updated_at DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );
    
    INSERT INTO users (username, email, password_hash, full_name, role) 
    VALUES ('admin', 'admin@terrachain.gov', '$2y$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi', 'System Administrator', 'admin')
    ON DUPLICATE KEY UPDATE username=username;
