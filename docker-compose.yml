version: "3.8"

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: terrachain-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: terrachain_v2
      MYSQL_USER: terrachain
      MYSQL_PASSWORD: terrachain123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP Application
  app:
    build: .
    container_name: terrachain-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./uploads:/var/www/html/uploads
    environment:
      DB_HOST: db
      DB_NAME: terrachain_v2
      DB_USER: terrachain
      DB_PASS: terrachain123
    depends_on:
      db:
        condition: service_healthy

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: terrachain-phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - db

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: terrachain-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

  # Grafana
  grafana:
    image: grafana/grafana-oss:latest
    container_name: terrachain-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  mysql_data:
